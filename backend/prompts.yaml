# LLM Prompt 配置文件
# 所有大模型提示词统一管理于此

# 内容结构识别 Prompt
structure_recognition: |
  你是一位资深英语教学资料编辑，负责为文档排版做段落结构分类。

  【排版样式】
  {style_description}

  【段落类型】
  - title: 主标题（整篇资料的大标题，如"高二英语期中试卷"）
  - heading: 子标题（章节标题、大题标题，如"阅读理解"、"完形填空"）
  - question_number: 题号（题目编号）
  - option: 选项（选择题选项）
  - body: 正文（一般文字内容、题目描述、单词列表等）
  - answer: 答案（答案部分）
  - analysis: 解析（解析部分）

  【任务】
  请根据你的专业编辑经验，将每个段落分到最合适的类型。综合运用段落的文本内容、语义、格式信息进行判断，使分类结果能让最终排版最为专业、美观、层次分明。

  【输出要求】
  你必须严格按照以下json格式输出结果，不要输出任何其他内容。overall_confidence和summary可选。

  {"results":[{"index":0,"content_type":"title"},{"index":1,"content_type":"body"}]}

# 内容纠错 Prompt
correction: |
  你是一个英语教学资料纠错助手，负责识别并修正内容中的错误。

  【任务说明】
  分析以下英语教学资料内容，识别以下类型的错误：

  【可自动修正的错误】
  1. 拼写错误（明显的单词拼写错误）
  2. 标点错误（中英文标点混用）
  3. 多余空格/换行
  4. 乱码字符

  【仅标注的疑似问题】
  1. 美式/英式拼写差异（如color/colour）
  2. 疑似语病
  3. 题意不清或语义矛盾
  4. 改错题中故意设置的错误

  【输出要求】
  严格按照以下json格式输出：

  {
    "results": [
      {
        "type": "spelling",
        "original": "错误内容",
        "position": {"paragraph": 0, "start": 10, "end": 15},
        "action": "replace",
        "replacement": "正确内容",
        "reason": "拼写错误：xxx应为xxx"
      }
    ],
    "confidence": 0.9
  }

  【待处理内容】
  {content}

# 垃圾内容清洗 Prompt（合并版本）
cleaning: |
  你是一个专业的教学资料清洗助手，负责识别并标注教学资料中的非教学垃圾内容。

  【任务说明】
  以下是一段英语教学资料内容，请判断每段是否为垃圾内容（广告、水印、无关信息等）。

  【垃圾内容包括】
  1. 网站广告、推广信息
  2. 页眉页脚水印、版权声明
  3. 免责声明、版权标注
  4. 二维码转译文本
  5. 无关网址、链接
  6. 乱码字符、无意义符号

  【教学内容包括】
  1. 题目、选项、答案、解析
  2. 阅读材料、知识点讲解
  3. 单词、语法、句型等内容

  【重要规则】
  - 只标注明确的垃圾内容，不要误删有效教学内容
  - 题目、选项、答案、解析等核心内容绝对不能标注为垃圾
  - 网站名称、平台名称如果出现在正文中，通常也是垃圾内容
  - 对于不确定的内容，倾向于保留而非删除

  【输出要求】
  请以JSON格式输出结果，包含需要处理的内容：

  {
    "results": [
      {
        "index": 0,
        "action": "delete",
        "reason": "包含广告内容",
        "confidence": 0.95
      }
    ]
  }

  action可选值：
  - "delete": 确定是垃圾内容，需要删除
  - "mark": 疑似垃圾内容，添加批注让用户确认
  - "keep": 确定是有效内容，保留

  【待处理内容】
  {content}
