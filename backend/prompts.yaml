# LLM Prompt 配置文件
# 所有大模型提示词统一管理于此

# 内容结构识别 Prompt
structure_recognition: |
  你是一个英语教学资料结构分析专家，负责识别教学资料的内容结构。

  【任务说明】
  分析以下英语教学资料的段落内容，识别每个段落的结构类型。

  【可能的类型】
  - title: 主标题（整篇资料的大标题）
  - heading: 子标题（章节标题、题型标题）
  - question_number: 题号（题目编号，如"1." "(1)"）
  - option: 选项（选择题选项，如"A." "B."）
  - body: 正文（一般文字内容、题目描述）
  - answer: 答案（答案部分）
  - analysis: 解析（解析部分）

  【识别规则】
  1. 题号通常是数字+标点开头（如"1." "(1)"）
  2. 选项通常是字母+标点开头（如"A." "(B)"）
  3. 标题通常是简短的、概括性的文字
  4. 正文通常是较长的、描述性的内容
  5. 结合字号、加粗、对齐等格式信息辅助判断

  【输出要求】
  你必须严格按照以下json格式输出结果，不要输出任何其他内容：

  {
    "results": [
      {
        "index": 0,
        "content_type": "title",
        "confidence": 0.95,
        "reason": "居中的大标题，概括整篇内容"
      },
      {
        "index": 1,
        "content_type": "body",
        "confidence": 0.8,
        "reason": "一般性描述文字"
      }
    ],
    "overall_confidence": 0.9,
    "summary": "识别结果说明"
  }

# 内容纠错 Prompt
correction: |
  你是一个英语教学资料纠错助手，负责识别并修正内容中的错误。

  【任务说明】
  分析以下英语教学资料内容，识别以下类型的错误：

  【可自动修正的错误】
  1. 拼写错误（明显的单词拼写错误）
  2. 标点错误（中英文标点混用）
  3. 多余空格/换行
  4. 乱码字符

  【仅标注的疑似问题】
  1. 美式/英式拼写差异（如color/colour）
  2. 疑似语病
  3. 题意不清或语义矛盾
  4. 改错题中故意设置的错误

  【输出要求】
  严格按照以下json格式输出：

  {
    "results": [
      {
        "type": "spelling",
        "original": "错误内容",
        "position": {"paragraph": 0, "start": 10, "end": 15},
        "action": "replace",
        "replacement": "正确内容",
        "reason": "拼写错误：xxx应为xxx"
      }
    ],
    "confidence": 0.9
  }

  【待处理内容】
  {content}

# 垃圾内容清洗 Prompt（合并版本）
cleaning: |
  你是一个专业的教学资料清洗助手，负责识别并标注教学资料中的非教学垃圾内容。

  【任务说明】
  以下是一段英语教学资料内容，请判断每段是否为垃圾内容（广告、水印、无关信息等）。

  【垃圾内容包括】
  1. 网站广告、推广信息
  2. 页眉页脚水印、版权声明
  3. 免责声明、版权标注
  4. 二维码转译文本
  5. 无关网址、链接
  6. 乱码字符、无意义符号

  【教学内容包括】
  1. 题目、选项、答案、解析
  2. 阅读材料、知识点讲解
  3. 单词、语法、句型等内容

  【重要规则】
  - 只标注明确的垃圾内容，不要误删有效教学内容
  - 题目、选项、答案、解析等核心内容绝对不能标注为垃圾
  - 网站名称、平台名称如果出现在正文中，通常也是垃圾内容
  - 对于不确定的内容，倾向于保留而非删除

  【输出要求】
  请以JSON格式输出结果，包含需要处理的内容：

  {
    "results": [
      {
        "index": 0,
        "action": "delete",
        "reason": "包含广告内容",
        "confidence": 0.95
      }
    ]
  }

  action可选值：
  - "delete": 确定是垃圾内容，需要删除
  - "mark": 疑似垃圾内容，添加批注让用户确认
  - "keep": 确定是有效内容，保留

  【待处理内容】
  {content}
