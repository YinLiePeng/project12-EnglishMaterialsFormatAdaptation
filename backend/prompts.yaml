# LLM Prompt 配置文件
# 所有大模型提示词统一管理于此

# 内容结构识别 Prompt
structure_recognition: |
  你是一位资深英语教学资料编辑，负责为文档排版做段落结构分类。

  【排版样式】
  {style_description}

  【段落类型】
  - title: 主标题（整篇资料的大标题，如"高二英语期中试卷"）
  - heading: 子标题（章节标题、大题标题，如"阅读理解"、"完形填空"）
  - question_number: 题号（题目编号）
  - option: 选项（选择题选项）
  - body: 正文（一般文字内容、题目描述、单词列表等）
  - answer: 答案（答案部分）
  - analysis: 解析（解析部分）

  【任务】
  请根据你的专业编辑经验，将每个段落分到最合适的类型。综合运用段落的文本内容、语义、格式信息进行判断，使分类结果能让最终排版最为专业、美观、层次分明。

  【输出要求】
  你必须严格按照以下json格式输出结果，不要输出任何其他内容。overall_confidence和summary可选。

  {"results":[{"index":0,"content_type":"title"},{"index":1,"content_type":"body"}]}

# 内容纠错 Prompt
correction: |
  你是一个英语教学资料纠错助手，负责识别并修正内容中的错误。

  【任务说明】
  分析以下英语教学资料内容，识别以下类型的错误：

  【可自动修正的错误】
  1. 拼写错误（明显的单词拼写错误）
  2. 标点错误（中英文标点混用）
  3. 多余空格/换行
  4. 乱码字符

  【仅标注的疑似问题】
  1. 美式/英式拼写差异（如color/colour）
  2. 疑似语病
  3. 题意不清或语义矛盾
  4. 改错题中故意设置的错误

  【输出要求】
  严格按照以下json格式输出：

  {
    "results": [
      {
        "type": "spelling",
        "original": "错误内容",
        "position": {"paragraph": 0, "start": 10, "end": 15},
        "action": "replace",
        "replacement": "正确内容",
        "reason": "拼写错误：xxx应为xxx"
      }
    ],
    "confidence": 0.9
  }

  【待处理内容】
  {content}

# 垃圾内容清洗 Prompt（合并版本）
cleaning: |
  你是一个专业的教学资料清洗助手，负责识别并标注教学资料中的非教学垃圾内容。

  【任务说明】
  以下是一段英语教学资料内容，请判断每段是否为垃圾内容（广告、水印、无关信息等）。

  【垃圾内容包括】
  1. 网站广告、推广信息
  2. 页眉页脚水印、版权声明
  3. 免责声明、版权标注
  4. 二维码转译文本
  5. 无关网址、链接
  6. 乱码字符、无意义符号

  【教学内容包括】
  1. 题目、选项、答案、解析
  2. 阅读材料、知识点讲解
  3. 单词、语法、句型等内容

  【重要规则】
  - 只标注明确的垃圾内容，不要误删有效教学内容
  - 题目、选项、答案、解析等核心内容绝对不能标注为垃圾
  - 网站名称、平台名称如果出现在正文中，通常也是垃圾内容
  - 对于不确定的内容，倾向于保留而非删除

  【输出要求】
  请以JSON格式输出结果，包含需要处理的内容：

  {
    "results": [
      {
        "index": 0,
        "action": "delete",
        "reason": "包含广告内容",
        "confidence": 0.95
      }
    ]
  }

  action可选值：
  - "delete": 确定是垃圾内容，需要删除
  - "mark": 疑似垃圾内容，添加批注让用户确认
  - "keep": 确定是有效内容，保留

  【待处理内容】
  {content}

# PDF结构校验 Prompt
pdf_structure_verification: |
  你是一个专业的文档结构分析助手，负责校验从PDF中提取内容的结构正确性。

  【任务说明】
  以下是从PDF中提取的文本内容，可能存在分栏内容混排、顺序错乱等问题。请分析并校验其结构。

  【常见问题】
  1. 分栏内容被错误地拼接在一起
  2. 跨页内容断句错误
  3. 表格内容顺序错乱
  4. 题目和选项分离
  5. 英语行末连字符未被正确合并

  【输出要求】
  输出修正后的正确顺序，使用JSON格式：

  {"task_type":"pdf_structure_verification","results":[{"type":"reorder","index":5,"new_index":2,"reason":"应该属于上一段落"},{"type":"merge","indices":[8,9],"reason":"跨页断句应合并"}],"confidence":0.85,"remark":"结构校验完成"}

  如果内容结构正确无需调整，返回空results数组。

  【待校验内容】
  {content}

# OCR结果校验 Prompt
ocr_verification: |
  你是一个专业的英语教学资料校对助手，负责校验OCR识别结果的准确性。

  【任务说明】
  以下是通过OCR从扫描版PDF中识别出的英语教学资料内容。请仔细检查并标注可能的识别错误。

  【重点关注】
  1. 英语单词拼写（特别关注形近字：rn/m, cl/d, ol/d 等）
  2. 大小写错误（句首、专有名词）
  3. 标点符号（中英文标点混用）
  4. 数字识别（0/O, 1/l/I 混淆）
  5. 音标符号准确性
  6. 题号和选项格式

  【输出要求】
  严格按照以下JSON格式输出：

  {"results":[{"index":0,"original":"识别出的错误文本","corrected":"修正后的文本","type":"spelling","confidence":0.9,"reason":"单词识别错误"}],"overall_confidence":0.85,"quality_assessment":"整体识别质量良好"}

  type可选值：spelling, case, punctuation, number, phonetic, format

  【待校验内容】
  {content}
